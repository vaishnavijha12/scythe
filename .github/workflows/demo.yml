name: Render demo GIF

# Re-renders demo/demo.gif from demo/demo.tape on a Linux runner and
# commits it back. We do this in CI because VHS / ttyd does not render
# reliably on native Windows, and we don't want every contributor to
# install VHS + ffmpeg + ttyd locally.
#
# Triggers:
#   - any push to main that touches the tape, the fixture helper, or the
#     CLI surface area whose output the GIF depicts
#   - manual dispatch (rerender on demand without a code change)

on:
  push:
    branches: [main]
    paths:
      - "demo/demo.tape"
      - "demo/fixture.py"
      - "scythe/cli.py"
      - "scythe/ui/ui.py"
      - ".github/workflows/demo.yml"
  workflow_dispatch:

concurrency:
  group: demo-gif
  cancel-in-progress: true

jobs:
  render:
    name: Render demo/demo.gif
    runs-on: ubuntu-latest
    # Hard cap so a hung VHS/ttyd session can't burn through Actions
    # minutes for hours — the render itself is well under a minute.
    timeout-minutes: 10
    permissions:
      contents: write   # required to push the regenerated GIF back to main
    steps:
      - uses: actions/checkout@v4
        with:
          # We need to push a commit; the default fetch-depth=1 is fine
          # because we only commit on top of HEAD.
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scythe
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Install VHS + dependencies
        # We install VHS from charm's official apt repo rather than via
        # charmbracelet/vhs-action, because the action's bundled ffmpeg
        # installer breaks intermittently on GitHub-hosted runners.
        # The apt package pulls in ffmpeg as a dependency. ttyd isn't
        # packaged at a recent-enough version on Ubuntu, so grab the
        # upstream static binary.
        run: |
          set -euxo pipefail

          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key \
              | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" \
              | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs ffmpeg

          TTYD_VERSION="1.7.7"
          curl -fsSL -o /tmp/ttyd \
              "https://github.com/tsl0922/ttyd/releases/download/${TTYD_VERSION}/ttyd.x86_64"
          chmod +x /tmp/ttyd
          sudo mv /tmp/ttyd /usr/local/bin/ttyd

          vhs --version
          ttyd --version
          ffmpeg -version | head -1

      - name: Sanity-check VHS with a tiny tape
        # If this hangs, the problem is the VHS/ttyd toolchain on the
        # runner, not our real tape. Easier to debug a 3-line tape than
        # the full demo.
        run: |
          set -euxo pipefail
          cat > /tmp/smoke.tape <<'TAPE'
          Output /tmp/smoke.gif
          Set Shell "bash"
          Set Width 400
          Set Height 200
          Type "echo hello-from-vhs"
          Enter
          Sleep 800
          TAPE
          timeout 120 vhs /tmp/smoke.tape
          ls -lh /tmp/smoke.gif

      - name: Render the real demo
        # Hard timeout in case ttyd hangs holding the websocket open.
        # 5 min is ~10x the expected render time.
        run: timeout 300 vhs demo/demo.tape

      - name: Show result
        run: |
          ls -lh demo/demo.gif demo/demo.mp4
          file demo/demo.gif

      - name: Commit regenerated GIF
        run: |
          # Stop early if nothing actually changed (e.g. timing was
          # identical) — git commit fails on an empty diff and we don't
          # want a red workflow for that.
          if git diff --quiet demo/demo.gif demo/demo.mp4; then
            echo "GIF unchanged — nothing to commit."
            exit 0
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add demo/demo.gif demo/demo.mp4
          git commit -m "chore: regenerate demo/demo.gif from demo.tape"
          git push
